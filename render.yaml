services:
  - type: web
    name: smarttask-api
    runtime: docker
    dockerfilePath: ./DockerFile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: GIN_MODE
        value: release
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY_HOURS
        value: 24
      - key: OPENAI_API_KEY
        value: ""
      - key: OPENAI_MODEL
        value: gpt-3.5-turbo
      - key: DB_PATH
        value: /app/data/smarttask.db
      - key: RATE_LIMIT_REQUESTS
        value: 100
      - key: RATE_LIMIT_PERIOD
        value: 1m
    disk:
      name: smarttask-data
      mountPath: /app/data
      sizeGB: 1